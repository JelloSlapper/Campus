<!--
  Campus Schedule Widget
  Embed this in a Squarespace Code Block.
-->

<style>
  .campus-widget { font-family: inherit; font-size: inherit; max-width: 100%; }

  /* --- Tabs --- */
  .campus-tabs { display: flex; border-bottom: 2px solid #222; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .campus-tab {
    background: none; border: none; border-bottom: 3px solid transparent;
    padding: 0.6rem 1.5rem; font-size: 1rem; font-family: inherit;
    cursor: pointer; margin-bottom: -2px; transition: background 0.15s;
  }
  .campus-tab.active { border-bottom-color: #222; font-weight: 600; }
  .campus-tab:hover:not(.active) { background: #f5f5f5; }

  /* --- Week strip --- */
  .campus-week-strip { display: flex; gap: 4px; margin-bottom: 0.75rem; }
  .campus-week-day {
    flex: 1; padding: 6px 4px; border: 1px solid #ddd; background: #fff;
    cursor: pointer; border-radius: 6px; display: flex; flex-direction: column;
    align-items: center; gap: 2px; font-family: inherit; transition: all 0.15s;
  }
  .campus-week-day:hover:not(.active) { background: #f5f5f5; border-color: #bbb; }
  .campus-week-day.active  { background: #222; color: #fff; border-color: #222; }
  .campus-week-day.today:not(.active) { border-color: #2c6fad; color: #2c6fad; }
  .campus-week-day-name { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.03em; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
  .campus-week-day-num  { font-size: 0.95rem; font-weight: 600; }
  /* Busyness dots */
  .campus-week-day-dots { display: flex; gap: 2px; justify-content: center; margin-top: 3px; min-height: 7px; }
  .campus-week-day-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .campus-week-day.active .campus-week-day-dot { opacity: 0.75; }

  /* --- Date nav --- */
  .campus-date-nav { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.9rem; flex-wrap: wrap; }
  .campus-date-nav button {
    background: #222; color: #fff; border: none;
    padding: 0.4rem 1rem; cursor: pointer; font-size: 0.88rem; border-radius: 4px;
    transition: background 0.15s;
  }
  .campus-date-nav button:hover { background: #444; }
  .campus-date-label {
    font-size: 1.1rem; font-weight: 600; cursor: pointer;
    border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px;
    background: #f8f8f8; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
  }
  .campus-date-label:hover { color: #2c6fad; border-color: #2c6fad; background: #eef4fb; }
  .campus-date-label::after { content: '\25BC'; font-size: 0.55em; opacity: 0.5; }
  .campus-today-btn  { background: #888 !important; font-size: 0.8rem !important; }
  .campus-print-btn  { background: #f0f0f0 !important; color: #444 !important; border: 1px solid #ccc !important; font-size: 0.8rem !important; }
  .campus-print-btn:hover { background: #e0e0e0 !important; }
  .campus-day-summary {
    font-size: 0.75rem; color: #777; background: #f0f0f0;
    padding: 3px 11px; border-radius: 12px; font-weight: 500; white-space: nowrap;
  }

  /* --- Venue filter --- */
  .campus-venue-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.6rem; align-items: center; }
  .campus-venue-filter-label { font-size: 0.73rem; color: #999; margin-right: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .campus-venue-btn {
    background: #f0f0f0; color: #444; border: 1px solid #ccc;
    padding: 0.28rem 0.85rem; cursor: pointer; font-size: 0.8rem; border-radius: 20px;
    font-family: inherit; transition: all 0.15s;
  }
  .campus-venue-btn:hover { background: #e0e0e0; }
  .campus-venue-btn.active { background: #222; color: #fff; border-color: #222; }

  /* --- Status legend --- */
  .campus-status-legend {
    display: flex; flex-wrap: wrap; gap: 0.5rem 1.1rem; margin-bottom: 1.1rem;
    padding: 0.55rem 0.85rem; background: #f8f8f8; border-radius: 6px;
    border: 1px solid #eee; align-items: center;
  }
  .campus-legend-label { font-size: 0.68rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 0.15rem; }
  .campus-legend-item  { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: #444; }
  .campus-legend-dot   { width: 22px; height: 14px; border-radius: 4px; flex-shrink: 0; }

  /* --- Timeline --- */
  .campus-timeline { overflow-x: auto; min-width: 0; }
  .campus-timeline-header { display: flex; margin-left: 190px; margin-bottom: 4px; }
  .campus-timeline-hour {
    flex: 1; font-size: 0.67rem; color: #aaa; font-weight: 500;
    text-align: left; padding: 0 0 3px 3px;
  }
  .campus-timeline-rows { border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }

  /* Venue section header */
  .campus-timeline-venue-hdr { display: flex; background: #f0f0f0; border-bottom: 2px solid #ddd; }
  .campus-timeline-venue-lbl {
    width: 190px; min-width: 190px; font-size: 0.67rem; font-weight: 700;
    color: #777; text-transform: uppercase; letter-spacing: 0.07em;
    padding: 7px 12px; border-right: 1px solid #e0e0e0;
    display: flex; flex-direction: column; gap: 5px; justify-content: center;
  }
  /* Venue utilization bar */
  .campus-venue-util-wrap  { display: flex; align-items: center; gap: 5px; }
  .campus-venue-util-track { flex: 1; height: 5px; background: rgba(0,0,0,0.12); border-radius: 3px; overflow: hidden; }
  .campus-venue-util-fill  { height: 100%; border-radius: 3px; }
  .campus-venue-util-pct   { font-size: 0.58rem; color: #aaa; white-space: nowrap; letter-spacing: 0; text-transform: none; font-weight: 500; }
  .campus-timeline-venue-trk { flex: 1; min-height: 16px; position: relative; }

  /* Space rows */
  .campus-timeline-row {
    display: flex; align-items: stretch; min-height: 56px;
    border-bottom: 1px solid #e8e8e8;
  }
  .campus-timeline-row--tall { min-height: 74px; }
  .campus-timeline-row:last-child { border-bottom: none; }
  .campus-timeline-row:nth-child(even) { background: #fafafa; }
  .campus-timeline-rows > div:nth-child(even) > .campus-timeline-row { background: #fafafa; }
  .campus-timeline-label {
    width: 190px; min-width: 190px; font-size: 0.77rem;
    padding: 0 12px; display: flex; align-items: center; font-weight: 500;
    color: #333; border-right: 1px solid #e8e8e8; background: inherit;
  }

  .campus-timeline-track { flex: 1; position: relative; min-height: inherit; }
  .campus-timeline-gridline {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: #eee; pointer-events: none;
  }

  /* "Now" indicator */
  .campus-timeline-nowline {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: rgba(220, 50, 50, 0.75); z-index: 5; pointer-events: none;
  }
  .campus-timeline-nowline::before {
    content: ''; position: absolute; top: -4px; left: -4px;
    width: 10px; height: 10px; border-radius: 50%; background: #dc3232;
  }

  /* Booking blocks */
  .campus-timeline-block {
    position: absolute; top: 7px; bottom: 7px;
    border-radius: 4px; overflow: hidden; cursor: pointer; min-width: 4px;
    border: 2px solid rgba(255,255,255,0.55);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: filter 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .campus-timeline-block:hover {
    filter: brightness(1.1);
    box-shadow: 0 4px 14px rgba(0,0,0,0.32);
    z-index: 10;
  }
  .campus-timeline-block-inner   { padding: 4px 7px; line-height: 1.3; }
  .campus-timeline-block-inner > div { margin: 0; padding: 0; }
  .campus-timeline-block-title   { font-size: 0.8em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .campus-timeline-block-comment { font-size: 0.72em; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
  .campus-timeline-block-time    { font-size: 0.72em; color: rgba(255,255,255,0.85); white-space: nowrap; }

  /* --- Skeleton loader --- */
  @keyframes campus-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .campus-skel {
    background: linear-gradient(90deg, #ebebeb 25%, #f4f4f4 50%, #ebebeb 75%);
    background-size: 200% 100%;
    animation: campus-shimmer 1.4s ease-in-out infinite;
    border-radius: 3px;
  }

  /* --- Fade transition --- */
  #campus-bookings, #campus-functions, #campus-cards { transition: opacity 0.15s ease; }

  /* --- Click popup --- */
  #campus-popup {
    position: fixed; z-index: 9999;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    padding: 14px 16px; min-width: 230px; max-width: 315px;
    pointer-events: none; overflow: hidden;
  }
  #campus-popup h4       { margin: 0 0 5px; font-size: 0.88rem; color: #111; line-height: 1.3; }
  .campus-popup-time     { font-size: 0.78rem; color: #444; font-weight: 600; margin-bottom: 7px; }
  .campus-popup-status   { display: inline-block; margin-bottom: 9px; padding: 2px 9px; border-radius: 10px; font-size: 0.69rem; font-weight: 600; color: #fff; }
  .campus-popup-comment  { font-size: 0.75rem; color: #666; font-style: italic; margin: 0 0 9px; padding: 6px 8px; background: #f6f6f6; border-radius: 4px; border-left: 3px solid #ddd; line-height: 1.4; }
  .campus-popup-row      { font-size: 0.78rem; color: #444; margin-bottom: 4px; }
  .campus-popup-row span { font-weight: 600; color: #111; }
  .campus-popup-venue    { font-size: 0.69rem; color: #bbb; margin-top: 8px; }

  /* --- Hover tooltip --- */
  #campus-hover-tip {
    position: fixed; z-index: 9998;
    background: rgba(28,28,28,0.93); color: #fff;
    border-radius: 6px; padding: 8px 12px; max-width: 220px;
    pointer-events: none; font-size: 0.76rem; line-height: 1.4;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
  }

  /* --- Month calendar popup --- */
  #campus-cal-popup {
    position: fixed; z-index: 9997;
    background: #fff; border: 1px solid #ddd; border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    padding: 12px; width: 248px;
    user-select: none;
  }
  .campus-cal-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .campus-cal-hdr button {
    background: none; border: none; cursor: pointer; font-size: 1rem;
    padding: 3px 8px; border-radius: 4px; color: #333; font-family: inherit;
    transition: background 0.12s;
  }
  .campus-cal-hdr button:hover { background: #f0f0f0; }
  .campus-cal-hdr span { font-weight: 600; font-size: 0.88rem; }
  .campus-cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .campus-cal-dh {
    text-align: center; font-size: 0.63rem; color: #bbb;
    text-transform: uppercase; padding: 4px 0; font-weight: 600;
  }
  .campus-cal-day {
    text-align: center; font-size: 0.8rem; padding: 5px 2px;
    border-radius: 4px; cursor: pointer; transition: background 0.1s; line-height: 1.2;
  }
  .campus-cal-day:hover:not(.selected):not(.empty) { background: #f0f0f0; }
  .campus-cal-day.today    { color: #2c6fad; font-weight: 700; }
  .campus-cal-day.selected { background: #222; color: #fff !important; font-weight: 600; }
  .campus-cal-day.empty    { cursor: default; }

  /* --- Functions table --- */
  .campus-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .campus-table th { background: #222; color: #fff; padding: 0.6rem 0.75rem; text-align: left; font-weight: 600; white-space: nowrap; }
  .campus-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
  .campus-table tr:nth-child(even) td { background: #f7f7f7; }

  /* --- Month view tab --- */
  .campus-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .campus-month-nav-btn { background: #222; color: #fff; border: none; padding: 0.4rem 1rem; cursor: pointer; font-size: 0.88rem; border-radius: 4px; font-family: inherit; transition: background 0.15s; }
  .campus-month-nav-btn:hover { background: #444; }
  .campus-month-nav-title { font-size: 1.1rem; font-weight: 600; }
  .campus-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .campus-month-dh { text-align: center; font-size: 0.68rem; color: #aaa; text-transform: uppercase; padding: 4px; font-weight: 600; }
  .campus-month-day { border: 1px solid #e8e8e8; border-radius: 6px; padding: 6px 7px; min-height: 72px; cursor: pointer; transition: all 0.12s; background: #fff; }
  .campus-month-day:hover:not(.empty) { background: #f5f5f5; border-color: #bbb; }
  .campus-month-day.empty { background: transparent; border-color: transparent; cursor: default; min-height: 0; }
  .campus-month-day.today { border-color: #2c6fad; }
  .campus-month-day.active { background: #222; border-color: #222; }
  .campus-month-day-num { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; color: #333; }
  .campus-month-day.today:not(.active) .campus-month-day-num { color: #2c6fad; }
  .campus-month-day.active .campus-month-day-num { color: #fff; }
  .campus-month-day-stats { font-size: 0.64rem; color: #555; line-height: 1.55; }
  .campus-month-day.active .campus-month-day-stats { color: rgba(255,255,255,0.8); }
  .campus-month-busy-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }

  /* --- Events (cards) tab --- */
  .campus-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; align-items: start; }
  .campus-card { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; }
  .campus-card-hdr { padding: 11px 14px 10px; background: #222; color: #fff; }
  .campus-card-org { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }
  .campus-card-body { padding: 4px 14px 2px; flex: 1; }
  .campus-card-booking { display: flex; align-items: flex-start; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
  .campus-card-booking:last-of-type { border-bottom: none; }
  .campus-card-space-name { font-size: 0.8rem; font-weight: 600; color: #222; display: flex; align-items: center; gap: 5px; }
  .campus-card-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .campus-card-event-desc { font-size: 0.71rem; color: #888; font-style: italic; margin-top: 2px; }
  .campus-card-time { font-size: 0.76rem; color: #555; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
  .campus-card-footer { padding: 8px 14px; background: #f8f8f8; border-top: 1px solid #eee; font-size: 0.78rem; color: #555; display: flex; flex-wrap: wrap; gap: 3px 16px; align-items: center; }
  .campus-card-contact-name { font-weight: 600; color: #333; }

  /* --- Timeline block expand button --- */
  .campus-fn-expand-btn {
    position: absolute; top: 3px; right: 4px;
    min-width: 18px; height: 16px; border-radius: 8px;
    background: rgba(255,255,255,0.25); color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
    font-size: 0.68rem; font-weight: 700; line-height: 16px;
    cursor: pointer; font-family: inherit; padding: 0 4px;
    white-space: nowrap; z-index: 2; transition: background 0.15s;
  }
  .campus-fn-expand-btn:hover { background: rgba(255,255,255,0.45); }

  /* --- Function expansion sub-timeline --- */
  .campus-fn-expand { border-top: 2px solid #5b6abf; background: #f3f5fd; }
  .campus-fn-expand-hdr {
    padding: 4px 12px 4px 202px;
    font-size: 0.64rem; font-weight: 700; color: #5b6abf;
    text-transform: uppercase; letter-spacing: 0.07em;
    background: rgba(91,106,191,0.07); border-bottom: 1px solid #dce4f0;
  }
  .campus-fn-expand-sub-row { display: flex; min-height: 40px; border-bottom: 1px solid #e4e8f4; align-items: stretch; }
  .campus-fn-expand-sub-row:last-child { border-bottom: none; }
  .campus-fn-expand-sub-lbl {
    width: 190px; min-width: 190px; font-size: 0.71rem; color: #3d4da8; font-weight: 500;
    padding: 0 12px 0 20px; display: flex; align-items: center;
    border-right: 1px solid #dce4f0; background: rgba(61,77,168,0.04);
    overflow: hidden;
  }
  .campus-fn-expand-sub-lbl span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .campus-fn-expand-sub-trk { flex: 1; position: relative; min-height: 40px; }

  /* --- States --- */
  .campus-empty { text-align: center; padding: 3rem 1rem; }
  .campus-empty svg { display: block; margin: 0 auto 0.75rem; opacity: 0.35; }
  .campus-empty p { font-size: 0.9rem; margin: 0; color: #bbb; }
  .campus-error { color: #c00; }

  /* --- Print --- */
  @media print {
    .campus-tabs, .campus-venue-filter, .campus-status-legend,
    #campus-week-strip-bookings, #campus-week-strip-functions, #campus-week-strip-cards,
    #campus-popup, #campus-hover-tip, #campus-cal-popup, .campus-month-nav { display: none !important; }
    .campus-date-nav button { display: none !important; }
    .campus-date-label { border: none; background: none; cursor: default; }
    .campus-date-label::after { display: none; }
    .campus-timeline { overflow: visible !important; }
    .campus-timeline-block { box-shadow: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .campus-cards-grid { grid-template-columns: repeat(2, 1fr) !important; }
    @page { margin: 1cm; size: landscape; }
  }
</style>

<!-- Shared overlays -->
<div id="campus-popup"    style="display:none"></div>
<div id="campus-hover-tip" style="display:none"></div>
<div id="campus-cal-popup" style="display:none" onclick="event.stopPropagation()"></div>

<div class="campus-widget">

  <div class="campus-tabs">
    <button class="campus-tab active" onclick="campusShowTab('bookings')">Space Bookings</button>
    <button class="campus-tab"        onclick="campusShowTab('functions')">Functions</button>
    <button class="campus-tab"        onclick="campusShowTab('month')">Month View</button>
    <button class="campus-tab"        onclick="campusShowTab('cards')">Events</button>
  </div>

  <!-- Space Bookings tab -->
  <div id="campus-tab-bookings">
    <div id="campus-week-strip-bookings"></div>
    <div class="campus-date-nav">
      <button onclick="campusChangeDay('bookings',-1)">&#8592; Prev</button>
      <span class="campus-date-label" id="campus-label-bookings" onclick="campusToggleCal('bookings',event)"></span>
      <button onclick="campusChangeDay('bookings',1)">Next &#8594;</button>
      <button class="campus-today-btn" onclick="campusGoToday('bookings')">Today</button>
      <button class="campus-print-btn"  onclick="window.print()">Print</button>
      <span id="campus-summary-bookings" class="campus-day-summary" style="display:none"></span>
    </div>
    <div id="campus-venue-filter" class="campus-venue-filter"></div>
    <div id="campus-status-legend" class="campus-status-legend"></div>
    <div id="campus-bookings"></div>
  </div>

  <!-- Month View tab -->
  <div id="campus-tab-month" style="display:none">
    <div id="campus-month-view"></div>
  </div>

  <!-- Events (Cards) tab -->
  <div id="campus-tab-cards" style="display:none">
    <div id="campus-week-strip-cards"></div>
    <div class="campus-date-nav">
      <button onclick="campusChangeDay('cards',-1)">&#8592; Prev</button>
      <span class="campus-date-label" id="campus-label-cards" onclick="campusToggleCal('cards',event)"></span>
      <button onclick="campusChangeDay('cards',1)">Next &#8594;</button>
      <button class="campus-today-btn" onclick="campusGoToday('cards')">Today</button>
      <button class="campus-print-btn"  onclick="window.print()">Print</button>
      <span id="campus-summary-cards" class="campus-day-summary" style="display:none"></span>
    </div>
    <div id="campus-cards"></div>
  </div>

  <!-- Functions tab -->
  <div id="campus-tab-functions" style="display:none">
    <div id="campus-week-strip-functions"></div>
    <div class="campus-date-nav">
      <button onclick="campusChangeDay('functions',-1)">&#8592; Prev</button>
      <span class="campus-date-label" id="campus-label-functions" onclick="campusToggleCal('functions',event)"></span>
      <button onclick="campusChangeDay('functions',1)">Next &#8594;</button>
      <button class="campus-today-btn" onclick="campusGoToday('functions')">Today</button>
      <span id="campus-summary-functions" class="campus-day-summary" style="display:none"></span>
    </div>
    <div id="campus-functions"></div>
  </div>

</div>

<script>
// =============================================================
// CONFIG
// =============================================================

function campusEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var CAMPUS_MONTHS     = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var CAMPUS_DAYS       = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var CAMPUS_DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function campusFmtDate(d) {
  return CAMPUS_DAYS[d.getDay()] + ', ' + CAMPUS_MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function campusSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// Busyness stats for a date (bookings count + planned attendance)
function campusGetDayStats(date) {
  var count = 0, attendance = 0;
  for (var i = 0; i < campusAllBookings.length; i++) {
    var b = campusAllBookings[i];
    var d = campusParseBookingDate(b['Date']);
    if (!d || !campusSameDay(d, date)) continue;
    if (/cancelled/i.test(b['Status - Event'] || '')) continue;
    count++;
    var att = parseInt(b['Planned Attendance'] || '0', 10);
    if (!isNaN(att)) attendance += att;
  }
  return { count: count, attendance: attendance };
}
// Dot colour + count for busyness indicator
function campusBusynessStyle(count, attendance) {
  if (count === 0) return null;
  var score = count + Math.floor(attendance / 50);
  return {
    color: score <= 3 ? '#2d9e6b' : score <= 7 ? '#e08c00' : '#c0392b',
    dots:  Math.min(5, count)
  };
}

// =============================================================
// TIME PARSING
// =============================================================
function campusParseTime12(str) {
  if (!str) return null;
  var mFull = str.match(/\d{4} (\d{2}):(\d{2}):\d{2}/);
  if (mFull) return parseInt(mFull[1], 10) * 60 + parseInt(mFull[2], 10);
  var m12 = str.match(/(\d+):(\d+)\s*(a\.m\.|p\.m\.)/i);
  if (m12) {
    var h = parseInt(m12[1], 10), min = parseInt(m12[2], 10), pm = /p\.m\./i.test(m12[3]);
    if (pm && h !== 12) h += 12;
    if (!pm && h === 12) h = 0;
    return h * 60 + min;
  }
  return null;
}
function campusParseTimeISO(str) {
  if (!str) return null;
  var m = str.match(/T(\d{2}):(\d{2})/);
  return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : null;
}
function campusMinsToStr(mins) {
  if (mins === null || mins === undefined) return '';
  var h = Math.floor(mins / 60), m = mins % 60;
  var suf = h >= 12 ? 'p.m.' : 'a.m.';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ' ' + suf;
}
var CAMPUS_MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function campusParseBookingDate(str) {
  if (!str) return null;
  var m = str.match(/\w{3} (\w{3}) (\d{2}) (\d{4})/);
  if (m && CAMPUS_MONTH_MAP[m[1]] !== undefined) return new Date(+m[3], CAMPUS_MONTH_MAP[m[1]], +m[2]);
  return null;
}
function campusParseISODate(str) {
  if (!str) return null;
  var m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}

// =============================================================
// Assigns each booking a stack depth (0 = back, 1 = one in front, …) using
// first-fit lane assignment so non-overlapping bookings can share a depth.
function campusStackDepths(spBookings) {
  var n = spBookings.length;
  var times = spBookings.map(function(b) {
    return { s: campusParseTime12(b['Start Time']), e: campusParseTime12(b['End Time']) };
  });
  var depths = [];
  for (var i = 0; i < n; i++) {
    var ti = times[i];
    if (ti.s === null || ti.e === null || ti.e <= ti.s) { depths.push(0); continue; }
    var used = {};
    for (var j = 0; j < i; j++) {
      var tj = times[j];
      if (tj.s === null || tj.e === null) continue;
      if (Math.max(ti.s, tj.s) < Math.min(ti.e, tj.e)) used[depths[j]] = true;
    }
    var d = 0;
    while (used[d]) d++;
    depths.push(d);
  }
  return depths;
}

    html += '<div class="campus-timeline-hour">' + lbl + '</div>';

  for (var g = 1; g < numHours; g++) {
    gridLines += '<div class="campus-timeline-gridline" style="left:' + (g / numHours * 100).toFixed(3) + '%"></div>';

  var nowLine = '';

    var nowMins = nowDate.getHours() * 60 + nowDate.getMinutes();
    if (nowMins >= TIMELINE_START_HR * 60 && nowMins <= TIMELINE_END_HR * 60) {
      nowLine = '<div class="campus-timeline-nowline" style="left:' + ((nowMins - TIMELINE_START_HR * 60) / totalMins * 100).toFixed(2) + '%"></div>';
    }
  }

  var venueMap = {};
  bookings.forEach(function(b) {
    var v = (b['Venue'] || 'Other').trim();
    var s = (b['Space'] || 'Unknown').trim();
    if (!venueMap[v]) venueMap[v] = {};
    if (!venueMap[v][s]) venueMap[v][s] = [];
    venueMap[v][s].push(b);
  });

  var orderedVenues = CAMPUS_VENUE_LIST.filter(function(v) { return venueMap[v]; });
  Object.keys(venueMap).forEach(function(v) {
    if (orderedVenues.indexOf(v) === -1) orderedVenues.push(v);
  });

  orderedVenues.forEach(function(venue) {
    var spaceMap = venueMap[venue];
    var spaces   = Object.keys(spaceMap).sort();

    // Venue utilization: total booked mins / total available mins across all spaces
    var totalAvailMins  = spaces.length * totalMins;
    var totalBookedMins = 0;
    spaces.forEach(function(space) {
      spaceMap[space].forEach(function(b) {
        var bs = campusParseTime12(b['Start Time']);
        var be = campusParseTime12(b['End Time']);
        if (bs !== null && be !== null && be > bs) {
          var cs = Math.max(bs, TIMELINE_START_HR * 60);
          var ce = Math.min(be, TIMELINE_END_HR * 60);
          if (ce > cs) totalBookedMins += (ce - cs);
        }
      });
    });
    var utilPct   = totalAvailMins > 0 ? Math.round(totalBookedMins / totalAvailMins * 100) : 0;
    var utilColor = utilPct < 30 ? '#2d9e6b' : utilPct < 65 ? '#e08c00' : '#c0392b';

    html += '<div class="campus-timeline-venue-hdr">' +
            '<div class="campus-timeline-venue-lbl">' +
            '<span>' + campusEsc(venue) + '</span>' +
            '<div class="campus-venue-util-wrap">' +
            '<div class="campus-venue-util-track"><div class="campus-venue-util-fill" style="width:' + utilPct + '%;background:' + utilColor + '"></div></div>' +
            '<span class="campus-venue-util-pct">' + utilPct + '% utilized</span>' +
            '</div></div>' +
            '<div class="campus-timeline-venue-trk">' + gridLines + '</div>' +
            '</div>';

    spaces.forEach(function(space) {
      var spBookings = spaceMap[space];
      var hasComment = spBookings.some(function(b) { return (b['System Comment'] || '').trim(); });
      var depths   = campusStackDepths(spBookings);
      var maxDepth = depths.reduce(function(m, d) { return Math.max(m, d); }, 0);
      var rowMinH  = (hasComment ? 74 : 56) + maxDepth * 22;
      var blocks = '', expandPanels = '';
      spBookings.forEach(function(b, bi) {
        var depth = depths[bi];
        var topPx = 7 + depth * 22;
        var idx   = bookings.indexOf(b);
        var start = campusParseTime12(b['Start Time']);
        var end   = campusParseTime12(b['End Time']);
        if (start === null || end === null || end <= start) return;
        var leftPct  = Math.max(0, (start - TIMELINE_START_HR * 60) / totalMins * 100);
        var widthPct = Math.min(100 - leftPct, (end - start) / totalMins * 100);
        var desc    = b['Event Description'] || b['Account Name'] || '';
        var comment = (b['System Comment'] || '').trim();
        var timeStr = campusMinsToStr(start) + ' \u2013 ' + campusMinsToStr(end);
        var col     = campusStatusColor(b['Status - Event']);
        // Only include functions whose time overlaps this booking
        var matchedFns = campusFnsForBooking(b).filter(function(fn) {
          var fs = campusParseTimeISO(fn['Start Time']);
          var fe = campusParseTimeISO(fn['End Time']);
          return fs !== null && fe !== null && Math.max(start, fs) < Math.min(end, fe);
        });
        var expandBtn = matchedFns.length > 0
          ? '<button id="campus-fn-btn-' + idx + '" class="campus-fn-expand-btn" onclick="campusToggleFnExpand(event,' + idx + ')" title="Show ' + matchedFns.length + ' function' + (matchedFns.length !== 1 ? 's' : '') + '">+' + matchedFns.length + '</button>'
          : '';
        var stackShadow = depth === 0
          ? '0 1px 4px rgba(0,0,0,0.22)'
          : '0 ' + (3 + depth * 3) + 'px ' + (8 + depth * 4) + 'px rgba(0,0,0,' + (0.28 + depth * 0.06).toFixed(2) + ')';
        var stackOpacity = depth === 0 ? '0.88' : '1';
        blocks += '<div class="campus-timeline-block"' +
                  ' style="left:' + leftPct.toFixed(2) + '%;width:' + widthPct.toFixed(2) + '%;top:' + topPx + 'px;bottom:7px;z-index:' + (depth + 1) + ';opacity:' + stackOpacity + ';box-shadow:' + stackShadow + ';background:' + col.grad + '"' +
                  ' onclick="campusShowPopup(event,' + idx + ')"' +
                  ' onmouseenter="campusShowHover(event,' + idx + ')"' +
                  ' onmousemove="campusMoveHover(event)"' +
                  ' onmouseleave="campusHideHover()">' +
                  '<div class="campus-timeline-block-inner">' +
                  '<div class="campus-timeline-block-title">' + campusEsc(desc) + '</div>' +
                  (comment ? '<div class="campus-timeline-block-comment">' + campusEsc(comment) + '</div>' : '') +
                  '<div class="campus-timeline-block-time">' + timeStr + '</div>' +
                  '</div>' + expandBtn + '</div>';
        if (matchedFns.length > 0) {
          var subRows = matchedFns.map(function(fn) {
            var fs = campusParseTimeISO(fn['Start Time']);
            var fe = campusParseTimeISO(fn['End Time']);
            var fLeft    = Math.max(0, (fs - TIMELINE_START_HR * 60) / totalMins * 100);
            var fWidth   = Math.min(100 - fLeft, (fe - fs) / totalMins * 100);
            var fname    = fn['Event Name'] || '';
            var ftimeStr = campusMinsToStr(fs) + ' \u2013 ' + campusMinsToStr(fe);
            var fordered = (fn['Ordered Attendance'] || '').trim();
            var factual  = (fn['Actual Attendance']  || '').trim();
            var fattStr  = fordered ? ' \u00b7 ' + fordered + (factual ? '/' + factual : '') + ' guests' : '';
            var fnBlock  = '<div class="campus-timeline-block"' +
                           ' style="left:' + fLeft.toFixed(2) + '%;width:' + fWidth.toFixed(2) + '%;top:5px;bottom:5px;cursor:default;background:linear-gradient(135deg,#5b6abf,#3d4da8)"' +
                           ' data-fn-name="'    + campusEsc(fname)                         + '"' +
                           ' data-fn-space="'   + campusEsc(fn['Space Description'] || '') + '"' +
                           ' data-fn-venue="'   + campusEsc(fn['Venue'] || '')             + '"' +
                           ' data-fn-start="'   + campusEsc(campusMinsToStr(fs))           + '"' +
                           ' data-fn-end="'     + campusEsc(campusMinsToStr(fe))           + '"' +
                           ' data-fn-ordered="' + campusEsc(fordered)                      + '"' +
                           ' data-fn-actual="'  + campusEsc(factual)                       + '"' +
                           ' onmouseenter="campusFnShowHover(event,this)"' +
                           ' onmousemove="campusMoveHover(event)"' +
                           ' onmouseleave="campusHideHover()">' +
                           '<div class="campus-timeline-block-inner">' +
                           '<div class="campus-timeline-block-title">' + campusEsc(fname) + '</div>' +
                           '<div class="campus-timeline-block-time">' + campusEsc(ftimeStr + fattStr) + '</div>' +
                           '</div></div>';
            return '<div class="campus-fn-expand-sub-row">' +
                   '<div class="campus-fn-expand-sub-lbl"><span>' + campusEsc(fname || '\u2014') + '</span></div>' +
                   '<div class="campus-fn-expand-sub-trk">' + gridLines + fnBlock + '</div>' +
                   '</div>';
          }).join('');
          expandPanels += '<div class="campus-fn-expand" id="campus-fn-expand-' + idx + '" style="display:none">' +
                          '<div class="campus-fn-expand-hdr">Functions</div>' +
                          subRows + '</div>';
        }
      });
      html += '<div>' +
              '<div class="campus-timeline-row" style="min-height:' + rowMinH + 'px">' +
              '<div class="campus-timeline-label">' + campusEsc(space) + '</div>' +
              '<div class="campus-timeline-track">' + gridLines + nowLine + blocks + '</div>' +
              '</div>' + expandPanels + '</div>';
    });
  });

  html += '</div></div>';
  return html;
}

}

// =============================================================
// BOOKINGS RENDER
// =============================================================
function campusRenderBookings() {
  document.getElementById('campus-label-bookings').textContent = campusFmtDate(campusBookingsDate);
  campusRenderWeekStrip('bookings');
  if (campusCalOpen && campusCalWhich === 'bookings') campusRenderCalGrid();

  campusFadeRender('campus-bookings', function(el) {
    var filtered = campusAllBookings.filter(function(r) {
      var d = campusParseBookingDate(r['Date']);
      if (!d || !campusSameDay(d, campusBookingsDate)) return false;
      if (/cancelled/i.test(r['Status - Event'] || '')) return false;
      if (campusBookingsVenue && (r['Venue'] || '').trim() !== campusBookingsVenue) return false;
      return true;
    });
    filtered.sort(function(a, b) { return (campusParseTime12(a['Start Time'])||0) - (campusParseTime12(b['Start Time'])||0); });

    // Day summary chip
    var sumEl = document.getElementById('campus-summary-bookings');
    if (filtered.length) {
      var vmap = {}, totalAttendance = 0;
      filtered.forEach(function(r) {
        vmap[(r['Venue'] || 'Other').trim()] = true;
        var att = parseInt(r['Planned Attendance'] || '0', 10);
        if (!isNaN(att)) totalAttendance += att;
      });
      var vc = Object.keys(vmap).length;
      sumEl.textContent = filtered.length + ' booking' + (filtered.length !== 1 ? 's' : '') +
        ' \u00b7 ' + vc + ' venue' + (vc !== 1 ? 's' : '') +
        (totalAttendance > 0 ? ' \u00b7 ' + totalAttendance + ' guests expected' : '');
      sumEl.style.display = '';
    } else {
      sumEl.style.display = 'none';
    }

    if (!filtered.length) {
      el.innerHTML = '<div class="campus-empty">' + CAMPUS_EMPTY_SVG + '<p>No bookings for this date.</p></div>';
      return;
    }
    el.innerHTML = campusRenderTimeline(filtered);
  });
}

// =============================================================
// FUNCTIONS RENDER
// =============================================================
function campusRenderFunctions() {
  document.getElementById('campus-label-functions').textContent = campusFmtDate(campusFunctionsDate);
  campusRenderWeekStrip('functions');
  if (campusCalOpen && campusCalWhich === 'functions') campusRenderCalGrid();

  campusFadeRender('campus-functions', function(el) {
    // Filter to selected date; skip rows with blank Space Description
    var filtered = campusAllFunctions.filter(function(r) {
      var d = campusParseISODate(r['Start Date']);
      if (!d || !campusSameDay(d, campusFunctionsDate)) return false;
      return (r['Space Description'] || '').trim() !== '';
    });
    filtered.sort(function(a,b) { return (campusParseTimeISO(a['Start Time'])||0) - (campusParseTimeISO(b['Start Time'])||0); });

    var sumEl = document.getElementById('campus-summary-functions');
    if (filtered.length) {
      sumEl.textContent = filtered.length + ' function' + (filtered.length !== 1 ? 's' : '');
      sumEl.style.display = '';
    } else {
      sumEl.style.display = 'none';
    }

    if (!filtered.length) {
      el.innerHTML = '<div class="campus-empty">' + CAMPUS_EMPTY_SVG + '<p>No functions for this date.</p></div>';
      return;
    }

    // Group by venue → space (using Venue column directly from functions data)
    var venueMap = {};
    filtered.forEach(function(fn) {
      var sp = (fn['Space Description'] || '').trim();
      var v  = (fn['Venue'] || 'Other').trim();
      if (!venueMap[v]) venueMap[v] = {};
      if (!venueMap[v][sp]) venueMap[v][sp] = [];
      venueMap[v][sp].push(fn);
    });

    var totalMins = (TIMELINE_END_HR - TIMELINE_START_HR) * 60;
    var numHours  = TIMELINE_END_HR - TIMELINE_START_HR;

    var gridLines = '';
    for (var g = 1; g < numHours; g++) {
      gridLines += '<div class="campus-timeline-gridline" style="left:' + (g / numHours * 100).toFixed(3) + '%"></div>';
    }

    var html = '<div class="campus-timeline"><div class="campus-timeline-header">';
    for (var h = TIMELINE_START_HR; h <= TIMELINE_END_HR; h++) {
      var lbl = h === 12 ? '12pm' : h < 12 ? h + 'am' : (h-12) + 'pm';
      html += '<div class="campus-timeline-hour">' + lbl + '</div>';
    }
    html += '</div><div class="campus-timeline-rows">';

    var orderedVenues = CAMPUS_VENUE_LIST.filter(function(v) { return venueMap[v]; });
    Object.keys(venueMap).forEach(function(v) {
      if (orderedVenues.indexOf(v) === -1) orderedVenues.push(v);
    });

    orderedVenues.forEach(function(venue) {
      var spaceMap = venueMap[venue];
      var spaces   = Object.keys(spaceMap).sort();

      html += '<div class="campus-timeline-venue-hdr">' +
              '<div class="campus-timeline-venue-lbl"><span>' + campusEsc(venue) + '</span></div>' +
              '<div class="campus-timeline-venue-trk">' + gridLines + '</div>' +
              '</div>';

      spaces.forEach(function(space) {
        var fns    = spaceMap[space];
        var blocks = '';
        fns.forEach(function(fn) {
          var start = campusParseTimeISO(fn['Start Time']);
          var end   = campusParseTimeISO(fn['End Time']);
          if (start === null || end === null || end <= start) return;
          var leftPct  = Math.max(0, (start - TIMELINE_START_HR * 60) / totalMins * 100);
          var widthPct = Math.min(100 - leftPct, (end - start) / totalMins * 100);
          var name    = fn['Event Name'] || '';
          var timeStr = campusMinsToStr(start) + ' \u2013 ' + campusMinsToStr(end);
          var ordered = (fn['Ordered Attendance'] || '').trim();
          var actual  = (fn['Actual Attendance']  || '').trim();
          var attStr  = ordered ? ' \u00b7 ' + ordered + (actual ? '/' + actual : '') + ' guests' : '';
          blocks += '<div class="campus-timeline-block"' +
                    ' style="left:' + leftPct.toFixed(2) + '%;width:' + widthPct.toFixed(2) + '%;background:linear-gradient(135deg,#5b6abf,#3d4da8)"' +
                    ' data-fn-name="'    + campusEsc(name)                         + '"' +
                    ' data-fn-space="'   + campusEsc(fn['Space Description'] || '') + '"' +
                    ' data-fn-venue="'   + campusEsc(fn['Venue'] || '')             + '"' +
                    ' data-fn-start="'   + campusEsc(campusMinsToStr(start))        + '"' +
                    ' data-fn-end="'     + campusEsc(campusMinsToStr(end))          + '"' +
                    ' data-fn-ordered="' + campusEsc(ordered)                       + '"' +
                    ' data-fn-actual="'  + campusEsc(actual)                        + '"' +
                    ' onmouseenter="campusFnShowHover(event,this)"' +
                    ' onmousemove="campusMoveHover(event)"' +
                    ' onmouseleave="campusHideHover()">' +
                    '<div class="campus-timeline-block-inner">' +
                    '<div class="campus-timeline-block-title">' + campusEsc(name) + '</div>' +
                    '<div class="campus-timeline-block-time">' + campusEsc(timeStr + attStr) + '</div>' +
                    '</div></div>';
        });
        html += '<div class="campus-timeline-row">' +
                '<div class="campus-timeline-label">' + campusEsc(space) + '</div>' +
                '<div class="campus-timeline-track">' + gridLines + blocks + '</div>' +
                '</div>';
      });
    });

    html += '</div></div>';
    el.innerHTML = html;
  });
}

// =============================================================
// MONTH VIEW TAB
// =============================================================
function campusRenderMonthView() {
  var el    = document.getElementById('campus-month-view');
  var today = campusToday();
  var firstDow = new Date(campusMonthYear, campusMonthMonth, 1).getDay();
  var daysInMo = new Date(campusMonthYear, campusMonthMonth + 1, 0).getDate();

  var html = '<div class="campus-month-nav">' +
    '<button class="campus-month-nav-btn" onclick="campusNavMonthView(-1)">&#8592; Prev</button>' +
    '<span class="campus-month-nav-title">' + CAMPUS_MONTHS[campusMonthMonth] + ' ' + campusMonthYear + '</span>' +
    '<button class="campus-month-nav-btn" onclick="campusNavMonthView(1)">Next &#8594;</button>' +
    '</div><div class="campus-month-grid">';

  CAMPUS_DAYS_SHORT.forEach(function(d) { html += '<div class="campus-month-dh">' + d + '</div>'; });
  for (var e = 0; e < firstDow; e++) html += '<div class="campus-month-day empty"></div>';

  for (var d = 1; d <= daysInMo; d++) {
    var date     = new Date(campusMonthYear, campusMonthMonth, d);
    var isToday  = campusSameDay(date, today);
    var isActive = campusSameDay(date, campusBookingsDate);
    var cls      = 'campus-month-day' + (isToday ? ' today' : '') + (isActive ? ' active' : '');
    var stats    = campusGetDayStats(date);
    var busy     = campusBusynessStyle(stats.count, stats.attendance);
    var statsHtml = '';
    if (stats.count > 0) {
      var dotColor = busy ? (isActive ? 'rgba(255,255,255,0.85)' : busy.color) : '#aaa';
      statsHtml = '<div class="campus-month-day-stats">' +
        '<div><span class="campus-month-busy-dot" style="background:' + dotColor + '"></span>' +
        stats.count + ' booking' + (stats.count !== 1 ? 's' : '') + '</div>' +
        (stats.attendance > 0 ? '<div style="padding-left:10px;font-size:0.6rem;opacity:0.8">' + stats.attendance.toLocaleString() + ' guests</div>' : '') +
        '</div>';
    }
    html += '<div class="' + cls + '" onclick="campusGoDateMonth(' + campusMonthYear + ',' + campusMonthMonth + ',' + d + ')">' +
            '<div class="campus-month-day-num">' + d + '</div>' + statsHtml + '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
function campusNavMonthView(delta) {
  campusMonthMonth += delta;
  if (campusMonthMonth > 11) { campusMonthMonth = 0; campusMonthYear++; }
  if (campusMonthMonth < 0)  { campusMonthMonth = 11; campusMonthYear--; }
  campusRenderMonthView();
}
function campusGoDateMonth(y, m, d) {
  campusBookingsDate = new Date(y, m, d);
  campusShowTab('bookings');
  campusRenderBookings();
}

// =============================================================
// EVENTS (CARDS) TAB
// =============================================================
function campusRenderCards() {
  document.getElementById('campus-label-cards').textContent = campusFmtDate(campusCardsDate);
  campusRenderWeekStrip('cards');
  if (campusCalOpen && campusCalWhich === 'cards') campusRenderCalGrid();

  campusFadeRender('campus-cards', function(el) {
    var filtered = campusAllBookings.filter(function(r) {
      var d = campusParseBookingDate(r['Date']);
      if (!d || !campusSameDay(d, campusCardsDate)) return false;
      if (/cancelled/i.test(r['Status - Event'] || '')) return false;
      return true;
    });

    var sumEl = document.getElementById('campus-summary-cards');
    if (filtered.length) {
      sumEl.textContent = filtered.length + ' booking' + (filtered.length !== 1 ? 's' : '');
      sumEl.style.display = '';
    } else { sumEl.style.display = 'none'; }

    if (!filtered.length) {
      el.innerHTML = '<div class="campus-empty">' + CAMPUS_EMPTY_SVG + '<p>No events for this date.</p></div>';
      return;
    }

    // Group bookings by Event Description
    var eventMap = {};
    filtered.forEach(function(b) {
      var evt = (b['Event Description'] || b['Account Name'] || 'Unknown').trim();
      if (!eventMap[evt]) eventMap[evt] = { bookings: [], contact: '', phone: '', account: '' };
      eventMap[evt].bookings.push(b);
      if (!eventMap[evt].contact && (b['Contact - Full Name'] || '').trim()) {
        eventMap[evt].contact = b['Contact - Full Name'].trim();
        eventMap[evt].phone   = (b['Contact - Phone'] || '').trim();
      }
      if (!eventMap[evt].account && (b['Account Name'] || '').trim()) {
        eventMap[evt].account = b['Account Name'].trim();
      }
    });

    // Sort events by earliest booking start time
    var events = Object.keys(eventMap).sort(function(a, b) {
      return (campusParseTime12(eventMap[a].bookings[0]['Start Time']) || 0) -
             (campusParseTime12(eventMap[b].bookings[0]['Start Time']) || 0);
    });

    var html = '<div class="campus-cards-grid">';
    events.forEach(function(evt) {
      var data = eventMap[evt];
      data.bookings.sort(function(a, b) {
        return (campusParseTime12(a['Start Time']) || 0) - (campusParseTime12(b['Start Time']) || 0);
      });
      html += '<div class="campus-card">' +
              '<div class="campus-card-hdr"><div class="campus-card-org">' + campusEsc(evt) + '</div></div>' +
              '<div class="campus-card-body">';
      data.bookings.forEach(function(b) {
        var start   = campusParseTime12(b['Start Time']);
        var end     = campusParseTime12(b['End Time']);
        var timeStr = campusMinsToStr(start) + ' \u2013 ' + campusMinsToStr(end);
        var space   = (b['Space'] || '').trim();
        var col     = campusStatusColor(b['Status - Event']);
        html += '<div class="campus-card-booking">' +
                '<div class="campus-card-space-name">' +
                '<span class="campus-card-status-dot" style="background:' + col.solid + '"></span>' +
                campusEsc(space || '\u2014') + '</div>' +
                '<div class="campus-card-time">' + campusEsc(timeStr) + '</div>' +
                '</div>';
      });
      html += '</div>' +
              '<div class="campus-card-footer">' +
              (data.account ? '<span>' + campusEsc(data.account) + '</span>' : '') +
              (data.contact ? '<span class="campus-card-contact-name">' + campusEsc(data.contact) + '</span>' : '<span style="color:#bbb;font-style:italic">No contact</span>') +
              (data.phone   ? '<span>' + campusEsc(data.phone) + '</span>' : '') +
              '</div></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  });
}

// =============================================================
// CSV PARSER
// =============================================================
function campusParseCSV(text) {
  var rows = [];
  text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').forEach(function(line) {
    if (!line.trim()) return;
    var row = [], field = '', inQ = false;
    for (var c = 0; c < line.length; c++) {
      var ch = line[c];
      if (ch === '"') { if (inQ && line[c+1] === '"') { field += '"'; c++; } else { inQ = !inQ; } }
      else if (ch === ',' && !inQ) { row.push(field.trim()); field = ''; }
      else { field += ch; }
    }
    row.push(field.trim()); rows.push(row);
  });
  return rows;
}
function campusCSVtoObj(rows) {
  if (rows.length < 2) return [];
  var h = rows[0];
  return rows.slice(1).map(function(r) { var o = {}; h.forEach(function(k,i) { o[k] = (r[i]||'').trim(); }); return o; });
}

campusBuildVenueFilter();
campusBuildStatusLegend();

// Set labels, week strips, and skeleton immediately — data loads async
document.getElementById('campus-label-bookings').textContent  = campusFmtDate(campusBookingsDate);
document.getElementById('campus-label-functions').textContent = campusFmtDate(campusFunctionsDate);
document.getElementById('campus-label-cards').textContent     = campusFmtDate(campusCardsDate);
campusRenderWeekStrip('bookings');
campusRenderWeekStrip('functions');
campusRenderWeekStrip('cards');
document.getElementById('campus-bookings').innerHTML  = campusRenderSkeleton();
document.getElementById('campus-functions').innerHTML = campusRenderSkeleton();

// Load bookings
fetch(CAMPUS_BOOKINGS_URL)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    campusAllBookings = data;
    campusRenderBookings();
    campusRenderCards();
    // Refresh other strips so busyness dots appear immediately
    campusRenderWeekStrip('functions');
    campusRenderWeekStrip('cards');
  })
  .catch(function(err) {
    document.getElementById('campus-bookings').innerHTML = '<p class="campus-error">Could not load bookings: ' + err.message + '</p>';
  });

// Load functions
var campusFnEl = document.getElementById('campus-functions');
if (CAMPUS_FUNCTIONS_URL) {
  fetch(CAMPUS_FUNCTIONS_URL)
    .then(function(r) { return r.json(); })
    .then(function(data) { campusAllFunctions = data; campusRenderFunctions(); })
    .catch(function(err) { campusFnEl.innerHTML = '<p class="campus-error">Could not load functions: ' + err.message + '</p>'; });
} else {
  fetch('https://corsproxy.io/?' + encodeURIComponent(CAMPUS_FUNCTIONS_CSV))
    .then(function(r) { return r.text(); })
    .then(function(text) { campusAllFunctions = campusCSVtoObj(campusParseCSV(text)); campusRenderFunctions(); })
    .catch(function(err) { campusFnEl.innerHTML = '<p class="campus-error">Could not load functions: ' + err.message + '</p>'; });
}
